<body>

<div style="padding:14px 22px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;backdrop-filter:blur(12px);background:rgba(10,14,26,0.55);z-index:10;">
<div>
<div style="font-size:14.5px;font-weight:600;letter-spacing:-0.01em;background:linear-gradient(90deg,#fff 0%,#c4bcf5 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Россильбер — цифровая платформа</div>
<div style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px;font-weight:400;letter-spacing:0.01em;">19 направлений · 94 процесса · 13 ИТ-систем · KPI-каскад · ИИ-управление</div>
</div>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
<div id="tabs" style="display:flex;gap:2px;background:rgba(255,255,255,0.04);padding:3px;border-radius:9px;border:1px solid rgba(255,255,255,0.06);">
<button class="tab active" data-tab="0">Архитектура</button>
<button class="tab" data-tab="1">KPI</button>
<button class="tab" data-tab="2">Зрелость</button>
</div>
<button id="fs" title="На весь экран" style="background:rgba(127,119,221,0.22);color:#fff;border:1px solid rgba(127,119,221,0.38);padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;letter-spacing:0.01em;">⛶ Полный экран</button>
</div>
</div>
<div id="body" style="flex:1;display:flex;min-height:0;">
<div id="side" style="width:230px;padding:16px 14px;border-right:1px solid rgba(255,255,255,0.06);font-size:12px;background:rgba(255,255,255,0.02);overflow-y:auto;backdrop-filter:blur(8px);">
<div class="secLbl">Слои</div>
<div id="layers"></div>
<div class="secLbl" style="margin-top:18px;">Управление</div>
<label style="display:flex;gap:8px;align-items:center;margin-bottom:7px;cursor:pointer;font-size:12px;"><input type="checkbox" id="rot" checked>Авто-вращение</label>
<label style="display:flex;gap:8px;align-items:center;margin-bottom:7px;cursor:pointer;font-size:12px;"><input type="checkbox" id="lbl" checked>Подписи</label>
<label style="display:flex;gap:8px;align-items:center;margin-bottom:11px;cursor:pointer;font-size:12px;"><input type="checkbox" id="inv" checked>Реверс X (лево↔право)</label>
<button id="reset" style="width:100%;padding:7px;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.12);border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;">Сброс камеры</button>
<div id="legend" style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);"></div>
<div id="info" style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:rgba(255,255,255,0.72);line-height:1.5;min-height:40px;"></div>
</div>
<div id="canvasWrap" style="flex:1;position:relative;min-width:0;">
<canvas id="cv" style="display:block;width:100%;height:100%;cursor:grab;"></canvas>
<div id="tip" style="position:absolute;background:rgba(15,18,30,0.92);border:1px solid rgba(127,119,221,0.35);padding:7px 11px;border-radius:7px;font-size:11px;display:none;pointer-events:none;max-width:260px;z-index:5;backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,0.4);font-weight:500;"></div>
<div id="hint" style="position:absolute;bottom:10px;right:14px;font-size:10px;color:rgba(255,255,255,0.3);font-weight:400;letter-spacing:0.05em;">Тащите · колесо зум · клик детали</div>
</div>
</div>
</div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
#app{letter-spacing:-0.005em;}
#app .tab{background:none;border:none;color:rgba(255,255,255,0.55);padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all 0.18s ease;letter-spacing:0.01em;}
#app .tab:hover{color:#fff;background:rgba(255,255,255,0.04);}

</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
const DIRS=[
{id:1,n:'Производство',c:'#7c3aed'},{id:2,n:'Качество',c:'#3b82f6'},{id:3,n:'R&D',c:'#eab308'},
{id:4,n:'Продажи',c:'#10b981'},{id:5,n:'Снабжение',c:'#f59e0b'},{id:6,n:'Развитие',c:'#ec4899'},
{id:7,n:'Опер.эфф.',c:'#06b6d4'},{id:8,n:'Персонал',c:'#84cc16'},{id:9,n:'Финансы',c:'#14b8a6'},
{id:10,n:'Безопасность',c:'#ef4444'},{id:11,n:'СОТ',c:'#f97316'},{id:12,n:'Право',c:'#a78bfa'},
{id:13,n:'ИТ',c:'#60a5fa'},{id:14,n:'Админ',c:'#94a3b8'},{id:15,n:'Техполитика',c:'#d946ef'},
{id:16,n:'ИИ',c:'#22d3ee'},{id:17,n:'Маркетинг',c:'#fb7185'},{id:18,n:'Покраска',c:'#65a30d'},
{id:19,n:'Ресейл',c:'#f472b6'}];
const PROCS=[[1,6],[2,5],[3,5],[4,5],[5,3],[6,5],[7,6],[8,6],[9,6],[10,5],[11,5],[12,5],[13,5],[14,5],[15,4],[16,7],[17,4],[18,4],[19,3]];
const PNAMES={1:['Планирование','Исполнение','Произв.учёт','Отгрузка','Оптимизация','Склад'],2:['Сырьё','ГП','Хранение','Несоотв.','СМК'],3:['Разработка','Аналоги','Себест.','НТД','Цикл'],4:['Аттестация','Планир.','ОВП','Новые','Ресейл'],5:['Поставщики','Закупки','Логистика'],6:['Стратегия','Аудит','Вовлеч.','Эффекты','Анализ'],7:['Аудит','Оптимиз.','KPI','5S','Риски','Коммуник.'],8:['Привлеч.','Адаптация','Обучение','Учёт','Мотивация','Регламенты'],9:['Бюджет','Бухучёт','Упр.учёт','Доходы','Внеш.орг','Цифров.'],10:['Экон.','Инф.','Физ.','Антитеррор','Кадр.'],11:['Программы','Инструкт.','Обучение','Работы','Док-ты'],12:['Договоры','Специф.','Рекламации','Защита','Риски'],13:['Запросы','Изменения','Инциденты','Активы','Доступы'],14:['Матрица','Анализ','Битрикс','Док-ты','Инструм.'],15:['Инновации','Строит.','ТОиР','Метрология'],16:['Локальные','Платформа','Обучение','ИБ','Лицензии','Стратегия','MVP'],17:['Рынок','Реклама','Бренд','Портфель'],18:['Услуги','Качество','Док-ты','Оборуд.'],19:['Тендеры','Розница','Автомат.']};
const ITS=[
{n:'1C:ERP',d:[1,5,9]},{n:'1C:MES',d:[1]},{n:'1C:LIMS',d:[2]},{n:'1C:WMS',d:[5,1]},
{n:'1C:Документооб.',d:[12,14]},{n:'1C:ЗУП+KPI',d:[8]},{n:'1C:ITILIUM',d:[13]},
{n:'1C:Аналитика',d:[7,9]},{n:'1C:Безопасность',d:[11]},{n:'1C:SKUD',d:[10]},
{n:'Битрикс 24',d:[4,14,6]},{n:'OBSIDIAN',d:[6,3]},{n:'ИИ/ML',d:[16,7]}];
const MAT=[
{y:2024,lvl:4,c:'#1e40af',t:'Старт концепции',d:'Стратегия. Архитектура процессов. Контрольные точки.'},
{y:2025,lvl:5,c:'#2563eb',t:'Регламентация',d:'Реестр процессов. Оцифровка. Владельцы.'},
{y:2026,lvl:6,c:'#eab308',t:'ERP и дашборды',d:'Перевод в ERP. Автодашборды. Контроль real-time.'},
{y:2027,lvl:7,c:'#f97316',t:'Цифр.аналитика',d:'Анализ данных. Выявление проблем на фактах.'},
{y:2028,lvl:8,c:'#dc2626',t:'ИИ-управление',d:'ИИ-агенты. Прогнозы. Рекомендации.'}];
const DRV=['Вовлечённость руковод.','IT-инфраструктура','Систематизация данных','Адм. и анализ'];

const cv=document.getElementById('cv');
const W=()=>cv.clientWidth,H=()=>cv.clientHeight;
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x04060d,500,1300);
const cam=new THREE.PerspectiveCamera(55,1,0.1,2000);
scene.add(new THREE.AmbientLight(0xffffff,0.65));
const dl=new THREE.DirectionalLight(0xffffff,0.55);dl.position.set(120,140,90);scene.add(dl);
const dl2=new THREE.DirectionalLight(0xa78bfa,0.25);dl2.position.set(-120,-60,-100);scene.add(dl2);

(function(){
  function starSprite(col,sz){
    const c=document.createElement('canvas');c.width=c.height=64;
    const ctx=c.getContext('2d'),g=ctx.createRadialGradient(32,32,0,32,32,32);
    g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.2,col);g.addColorStop(0.5,col.replace('1)','0.35)'));g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,64,64);
    const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;return t;
  }
  const starTex=starSprite('rgba(220,225,255,1)',1);

  // layer 1: dense distant star field (small, vertex colors)
  const N=3400,pos=new Float32Array(N*3),col=new Float32Array(N*3),sz=new Float32Array(N);
  for(let i=0;i<N;i++){
    const r=800+Math.random()*1100,th=Math.acos(2*Math.random()-1),ph=Math.random()*Math.PI*2;
    pos[i*3]=r*Math.sin(th)*Math.cos(ph);pos[i*3+1]=r*Math.cos(th);pos[i*3+2]=r*Math.sin(th)*Math.sin(ph);
    const t=Math.random();const c=t<0.55?[1,1,1]:t<0.78?[0.75,0.82,1]:t<0.92?[1,0.88,0.75]:[1,0.72,0.62];
    col[i*3]=c[0];col[i*3+1]=c[1];col[i*3+2]=c[2];
    sz[i]=0.6+Math.random()*1.8;
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  const m=new THREE.PointsMaterial({size:1.8,sizeAttenuation:true,transparent:true,opacity:0.92,vertexColors:true,depthWrite:false,map:starTex,blending:THREE.AdditiveBlending});
  const stars=new THREE.Points(g,m);scene.add(stars);scene.userData.stars=stars;

  // layer 2: mid bright stars (twinkling)
  const N2=160,pos2=new Float32Array(N2*3);
  for(let i=0;i<N2;i++){
    const r=450+Math.random()*500,th=Math.acos(2*Math.random()-1),ph=Math.random()*Math.PI*2;
    pos2[i*3]=r*Math.sin(th)*Math.cos(ph);pos2[i*3+1]=r*Math.cos(th);pos2[i*3+2]=r*Math.sin(th)*Math.sin(ph);
  }
  const g2=new THREE.BufferGeometry();g2.setAttribute('position',new THREE.BufferAttribute(pos2,3));
  const m2=new THREE.PointsMaterial({size:4.5,sizeAttenuation:true,transparent:true,opacity:0.95,color:0xc4bcf5,depthWrite:false,map:starTex,blending:THREE.AdditiveBlending});
  const bigStars=new THREE.Points(g2,m2);scene.add(bigStars);scene.userData.bigStars=bigStars;

  // layer 3: foreground bright accents
  const N3=40,pos3=new Float32Array(N3*3),col3=new Float32Array(N3*3);
  for(let i=0;i<N3;i++){
    const r=320+Math.random()*260,th=Math.acos(2*Math.random()-1),ph=Math.random()*Math.PI*2;
    pos3[i*3]=r*Math.sin(th)*Math.cos(ph);pos3[i*3+1]=r*Math.cos(th);pos3[i*3+2]=r*Math.sin(th)*Math.sin(ph);
    const tt=Math.random();const cc=tt<0.5?[0.95,0.78,1]:tt<0.8?[0.75,0.9,1]:[1,0.85,0.7];
    col3[i*3]=cc[0];col3[i*3+1]=cc[1];col3[i*3+2]=cc[2];
  }
  const g3=new THREE.BufferGeometry();g3.setAttribute('position',new THREE.BufferAttribute(pos3,3));g3.setAttribute('color',new THREE.BufferAttribute(col3,3));
  const m3=new THREE.PointsMaterial({size:8,sizeAttenuation:true,transparent:true,opacity:0.9,depthWrite:false,map:starTex,blending:THREE.AdditiveBlending,vertexColors:true});
  const accentStars=new THREE.Points(g3,m3);scene.add(accentStars);scene.userData.accentStars=accentStars;

  // nebula clouds — large translucent billboards
  function nebulaTex(colA,colB){
    const c=document.createElement('canvas');c.width=c.height=256;
    const ctx=c.getContext('2d');
    for(let k=0;k<90;k++){
      const x=Math.random()*256,y=Math.random()*256,r=20+Math.random()*85;
      const gr=ctx.createRadialGradient(x,y,0,x,y,r);
      gr.addColorStop(0,Math.random()<0.5?colA:colB);gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr;ctx.fillRect(0,0,256,256);
    }
    const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;return t;
  }
  const nebs=[
    {c:['rgba(120,90,200,0.16)','rgba(60,120,220,0.1)'],p:[-700,220,-600],s:900},
    {c:['rgba(200,80,160,0.12)','rgba(120,40,200,0.08)'],p:[650,-120,-750],s:1000},
    {c:['rgba(40,180,220,0.12)','rgba(100,80,200,0.08)'],p:[-100,-500,800],s:1100},
    {c:['rgba(220,150,90,0.08)','rgba(200,80,100,0.06)'],p:[500,400,600],s:800}
  ];
  const nebGroup=new THREE.Group();scene.add(nebGroup);scene.userData.neb=nebGroup;
  nebs.forEach(n=>{
    const s=new THREE.Sprite(new THREE.SpriteMaterial({map:nebulaTex(n.c[0],n.c[1]),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
    s.position.set(n.p[0],n.p[1],n.p[2]);s.scale.set(n.s,n.s,1);nebGroup.add(s);
  });
})();

const cs={r:380,th:Math.PI/2,ph:0,tx:0,ty:0,tz:0};
function upCam(){
cam.position.x=cs.tx+cs.r*Math.sin(cs.th)*Math.cos(cs.ph);
cam.position.y=cs.ty+cs.r*Math.cos(cs.th);
cam.position.z=cs.tz+cs.r*Math.sin(cs.th)*Math.sin(cs.ph);
cam.lookAt(cs.tx,cs.ty,cs.tz);
}
let drag=false,lx=0,ly=0;
cv.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;cv.style.cursor='grabbing';cv.setPointerCapture(e.pointerId);});
cv.addEventListener('pointermove',e=>{
if(!drag){hov(e);return;}
const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
const inv=document.getElementById('inv').checked?-1:1;
cs.ph-=dx*0.006*inv;
cs.th=Math.max(0.15,Math.min(Math.PI-0.15,cs.th-dy*0.006));
upCam();
});
cv.addEventListener('pointerup',()=>{drag=false;cv.style.cursor='grab';});
cv.addEventListener('wheel',e=>{e.preventDefault();cs.r=Math.max(80,Math.min(900,cs.r*(1+e.deltaY*0.001)));upCam();},{passive:false});

const SG=[new THREE.Group(),new THREE.Group(),new THREE.Group(),new THREE.Group()];
SG.forEach(g=>scene.add(g));
const HOV=[[],[],[],[]];

function label(txt,col='#fff',sz=12,bg=null){
const c=document.createElement('canvas'),ctx=c.getContext('2d'),pd=6,fp=sz*2.2;
ctx.font=`500 ${fp}px 'Anthropic Sans',sans-serif`;
const w=ctx.measureText(txt).width+pd*2,h=fp+pd*1.1;
c.width=w;c.height=h;
ctx.font=`500 ${fp}px 'Anthropic Sans',sans-serif`;
if(bg){ctx.fillStyle=bg;const r=6;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(w-r,0);ctx.quadraticCurveTo(w,0,w,r);ctx.lineTo(w,h-r);ctx.quadraticCurveTo(w,h,w-r,h);ctx.lineTo(r,h);ctx.quadraticCurveTo(0,h,0,h-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();}
ctx.fillStyle=col;ctx.textBaseline='middle';ctx.fillText(txt,pd,h/2);
const tx=new THREE.CanvasTexture(c);tx.minFilter=THREE.LinearFilter;
const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false,depthTest:false}));
s.scale.set(w*0.22,h*0.22,1);s.userData.isLbl=true;return s;
}
function node(col,sz=4){
return new THREE.Mesh(new THREE.SphereGeometry(sz,16,16),new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.35,shininess:50}));
}
function ln(a,b,col,op=0.25){
return new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:col,transparent:true,opacity:op}));
}

const LA={comp:new THREE.Group(),dirs:new THREE.Group(),procs:new THREE.Group(),it:new THREE.Group(),links:new THREE.Group()};
Object.values(LA).forEach(g=>SG[0].add(g));

const hub=node('#7f77dd',9);hub.position.set(0,130,0);
hub.userData={name:'Россильбер',info:'ГК Россильбер: 19 направлений, 94 процесса, 13 ИТ-систем'};
LA.comp.add(hub);HOV[0].push(hub);
const hubL=label('РОССИЛЬБЕР','#fff',13,'rgba(127,119,221,0.7)');hubL.position.set(0,148,0);LA.comp.add(hubL);

const dnodes={};
DIRS.forEach((d,i)=>{
const a=(i/DIRS.length)*Math.PI*2,x=Math.cos(a)*130,z=Math.sin(a)*130,y=40;
const m=node(d.c,5);m.position.set(x,y,z);
m.userData={name:d.n,info:`Направление №${d.id}: ${d.n}`};
LA.dirs.add(m);HOV[0].push(m);dnodes[d.id]=m;
const l=label(d.n,'#fff',10);l.position.set(x*1.2,y+8,z*1.2);LA.dirs.add(l);
LA.links.add(ln(m.position,hub.position,d.c,0.2));
});

PROCS.forEach(([did,count])=>{
const parent=dnodes[did],dir=DIRS.find(x=>x.id===did),names=PNAMES[did]||[];
for(let k=0;k<count;k++){
const a=(k/count)*Math.PI*2,r=22,px=parent.position.x+Math.cos(a)*r,pz=parent.position.z+Math.sin(a)*r,py=-50+Math.sin(a*2)*6;
const m=node(dir.c,2);m.position.set(px,py,pz);m.material.emissiveIntensity=0.25;
m.userData={name:names[k]||`Процесс ${k+1}`,info:`${names[k]||'Процесс'} (${dir.n})`};
LA.procs.add(m);HOV[0].push(m);
LA.links.add(ln(m.position,parent.position,dir.c,0.15));
}

function hex2rgb(h){h=h.replace('#','');return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)];}
function haloMat(col){return new THREE.SpriteMaterial({map:haloTex(col),transparent:true,depthWrite:false,depthTest:false,blending:THREE.AdditiveBlending});}
function haloTex(col){
  const c=document.createElement('canvas');c.width=c.height=128;
  const ctx=c.getContext('2d'),g=ctx.createRadialGradient(64,64,4,64,64,64);
  const [r,gg,b]=hex2rgb(col);
  g.addColorStop(0,`rgba(${r},${gg},${b},0.95)`);
  g.addColorStop(0.25,`rgba(${r},${gg},${b},0.45)`);
  g.addColorStop(0.55,`rgba(${r},${gg},${b},0.12)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  const t=new THREE.CanvasTexture(c);t.minFilter=THREE.LinearFilter;return t;
}
function gnode(col,sz,emiss){
  const m=new THREE.Mesh(new THREE.SphereGeometry(sz,24,24),new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:emiss||0.45,shininess:60,specular:0x222244}));
  const halo=new THREE.Sprite(haloMat(col));halo.scale.set(sz*4.5,sz*4.5,1);halo.visible=false;
  m.userData._halo=halo;LD.lk.add(halo);
  return m;
}
function ringNode(parent,col,sz,x,y,z,name,info,emiss){
  const m=gnode(col,sz,emiss);m.position.set(x,y,z);
  m.userData.name=name;m.userData.info=info;
  parent.add(m);HOV[1].push(m);return m;
}

r.innerHTML=`<input type="checkbox" ${c.g[k].visible?'checked':''}><span class="ldot" style="background:${c.col[k]||'#888'}"></span><span>${c.lbl[k]||k}</span><span class="lcnt">${c.cnt[k]!==undefined?c.cnt[k]:''}</span>`;
box.appendChild(r);
r.querySelector('input').addEventListener('change',e=>{c.g[k].visible=e.target.checked;});
});
document.getElementById('legend').innerHTML='<div class="secLbl">Легенда</div>'+LEG[at].map(l=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;font-size:11px;color:rgba(255,255,255,0.78);"><span style="width:9px;height:9px;border-radius:50%;background:${l[1]};box-shadow:0 0 6px ${l[1]};"></span>${l[0]}</div>`).join('');
}

function sw(i){
setHover(null);
at=i;SG.forEach((g,k)=>g.visible=(k===i));
if(i===0){cs.r=380;cs.th=Math.PI/2;cs.ph=0;cs.tx=cs.ty=cs.tz=0;}
else if(i===1){cs.r=620;cs.th=Math.PI/2.05;cs.ph=Math.PI/6;cs.tx=0;cs.ty=0;cs.tz=0;}
else{cs.r=440;cs.th=Math.PI/2.2;cs.ph=0;cs.tx=cs.ty=cs.tz=0;}
upCam();
document.querySelectorAll('#tabs .tab').forEach((b,k)=>b.classList.toggle('active',k===i));
document.getElementById('info').innerHTML='';
renderL();applyT();
}
document.querySelectorAll('#tabs .tab').forEach(b=>b.addEventListener('click',()=>sw(parseInt(b.dataset.tab))));

function applyT(){
const sl=document.getElementById('lbl').checked;
scene.traverse(o=>{if(o.userData&&o.userData.isLbl)o.visible=sl;});
}
document.getElementById('lbl').addEventListener('change',applyT);
document.getElementById('reset').addEventListener('click',()=>sw(at));

const app=document.getElementById('app');
const fsBtn=document.getElementById('fs');
fsBtn.addEventListener('click',()=>{
if(!document.fullscreenElement){
(app.requestFullscreen||app.webkitRequestFullscreen||app.msRequestFullscreen).call(app);
}else{
(document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen).call(document);
}
});
document.addEventListener('fullscreenchange',()=>{
fsBtn.textContent=document.fullscreenElement?'⛶ Выйти':'⛶ Полный экран';
setTimeout(rsz,50);
});

const rc=new THREE.Raycaster(),mp=new THREE.Vector2();
const tip=document.getElementById('tip'),info=document.getElementById('info');
let hoveredObj=null;
function setHover(o){
  if(hoveredObj===o)return;
  if(hoveredObj&&hoveredObj.material){
    const u=hoveredObj.userData;
    if(u._oEm!==undefined){hoveredObj.material.emissiveIntensity=u._oEm;}
    if(u._oSc!==undefined){hoveredObj.scale.setScalar(u._oSc);}
    if(u._halo){u._halo.visible=false;}
  }
  hoveredObj=o;
  if(o&&o.material){
    const u=o.userData;
    if(u._oEm===undefined)u._oEm=o.material.emissiveIntensity||0;
    if(u._oSc===undefined)u._oSc=o.scale.x||1;
    o.material.emissiveIntensity=Math.min(1.4,(u._oEm||0.3)+0.85);
    o.scale.setScalar(u._oSc*1.35);
    if(u._halo){u._halo.visible=true;u._halo.position.copy(o.position);}
  }
}
function hov(e){
const rt=cv.getBoundingClientRect();
mp.x=((e.clientX-rt.left)/rt.width)*2-1;mp.y=-((e.clientY-rt.top)/rt.height)*2+1;
rc.setFromCamera(mp,cam);
const h=rc.intersectObjects(HOV[at],false);
if(h.length){
tip.style.display='block';tip.style.left=(e.clientX-rt.left+12)+'px';tip.style.top=(e.clientY-rt.top+12)+'px';
tip.textContent=h[0].object.userData.name||'';cv.style.cursor='pointer';
setHover(h[0].object);
}else{tip.style.display='none';if(!drag)cv.style.cursor='grab';setHover(null);}
}
cv.addEventListener('click',e=>{
const rt=cv.getBoundingClientRect();
mp.x=((e.clientX-rt.left)/rt.width)*2-1;mp.y=-((e.clientY-rt.top)/rt.height)*2+1;
rc.setFromCamera(mp,cam);
const h=rc.intersectObjects(HOV[at],false);
if(h.length){
const d=h[0].object.userData;
info.innerHTML=`<div style="color:#fff;font-weight:500;margin-bottom:3px;">${d.name||''}</div><div>${(d.info||'').replace(/\n/g,'<br>')}</div>`;
}
});

let ar=true;
document.getElementById('rot').addEventListener('change',e=>ar=e.target.checked);
function tick(){
if(ar&&!drag){cs.ph+=0.002;upCam();}
if(at===1){
  const t=Date.now()*0.001;
  if(scene.userData.aiCore){scene.userData.aiCore.rotation.y=t*0.3;scene.userData.aiCore.rotation.x=t*0.18;scene.userData.aiCore.material.emissiveIntensity=0.75+Math.sin(t*1.6)*0.2;}
  if(scene.userData.aiWire){scene.userData.aiWire.rotation.y=-t*0.04;}
  LD.twins.children.forEach((c,i)=>{if(c.isMesh)c.rotation.y=t*0.5+i;});
}
if(scene.userData.bigStars){scene.userData.bigStars.rotation.y+=0.0003;scene.userData.bigStars.material.opacity=0.75+Math.sin(Date.now()*0.0012)*0.2;}
if(scene.userData.accentStars){scene.userData.accentStars.rotation.y+=0.0005;scene.userData.accentStars.material.size=7+Math.sin(Date.now()*0.002)*2;}
if(scene.userData.stars){scene.userData.stars.rotation.y+=0.00008;}
if(scene.userData.neb){scene.userData.neb.rotation.y+=0.00004;}
renderer.render(scene,cam);requestAnimationFrame(tick);
}
function rsz(){renderer.setSize(W(),H(),false);cam.aspect=W()/H();cam.updateProjectionMatrix();}
window.addEventListener('resize',rsz);
setTimeout(rsz,50);
renderL();upCam();tick();
})();
</script>
</body>
</html>
